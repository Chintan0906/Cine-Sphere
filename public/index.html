<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSphere - Premium Cinematic Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            perspective: 1000px;
        }

        /* Dynamic Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(30, 20, 0, 0.8) 0%, var(--bg-dark) 60%);
            z-index: -2;
        }

        #stars { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px rgba(255, 255, 255, 0.6);
            animation: twinkle var(--duration, 4s) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.6) translateY(0); }
            100% { opacity: 1; transform: scale(1.3) translateY(-5px); }
        }

        /* Mouse Glow */
        .cursor-glow {
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            opacity: 0.15;
            transition: opacity 0.3s ease;
        }

        /* Navigation */
        nav {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--primary); }

        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: var(--text-muted); text-decoration: none; margin-left: 30px; font-weight: 500; font-family: 'Outfit', sans-serif; transition: 0.3s; font-size: 1.1rem; }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a.btn-register {
            background: rgba(255, 215, 0, 0.1);
            color: var(--primary);
            padding: 8px 24px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
            margin-left: 20px;
        }
        .nav-links a.btn-register:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        /* Hero */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: 60px;
            padding: 0 20px;
            z-index: 10;
            position: relative;
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #ffe066);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s 0.2s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s 0.4s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Portal Grid */
        .portal-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1.5s 0.8s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1400px;
            width: 100%;
        }

        @media (max-width: 1200px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 40px; } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 3rem; } }

        /* Glass Cards */
        .card {
            position: relative;
            height: 420px;
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .card:hover {
            border-color: rgba(255, 215, 0, 0.3);
            box-shadow: 0 40px 80px rgba(255, 215, 0, 0.15), 0 0 40px rgba(255, 215, 0, 0.1) inset;
            transform: translateY(-10px);
        }

        .card-img {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.5;
            transition: 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: grayscale(40%) contrast(120%);
        }

        .card:hover .card-img {
            opacity: 0.8;
            transform: scale(1.08);
            filter: grayscale(0%) contrast(110%);
        }

        .card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5,5,5,1) 0%, rgba(5,5,5,0.4) 50%, transparent 100%);
            z-index: 1;
        }

        .card-content {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 30px;
            z-index: 2;
            transform: translateY(20px);
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .card:hover .card-content {
            transform: translateY(0);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: inline-block;
            transition: 0.5s;
        }

        .card:hover .card-icon {
            transform: scale(1.1) translateY(-5px);
            text-shadow: 0 0 20px var(--primary);
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .card-desc {
            font-size: 1rem;
            color: var(--primary);
            opacity: 0;
            transform: translateY(10px);
            transition: 0.4s 0.1s;
        }

        .card:hover .card-desc {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div id="stars"></div>

    <nav>
        <a href="about_us.html" class="logo">CINE<span>SPHERE</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <div class="hero">
        <h1>UNLEASH THE<br>CINEMATIC UNIVERSE</h1>
        <p>Book tickets, discover new worlds, explore reviews, and craft the ultimate movie night from one premium portal.</p>
    </div>

    <div class="portal-container">
        <div class="grid">
            <!-- BOOKING -->
            <a href="book_tickets.html" class="card">
                <div class="card-img" style="background-image: url('https://image.tmdb.org/t/p/w500/1pdfLvkbY9ohJlCjQH2CZjjYVvJ.jpg');"></div>
                <div class="card-gradient"></div>
                <div class="card-content">
                    <span class="card-icon">🎟️</span>
                    <h2 class="card-title">Booking</h2>
                    <p class="card-desc">Reserve Your Seats</p>
                </div>
            </a>

            <!-- DISCOVERY -->
            <a href="movie_info.html" class="card">
                <div class="card-img" style="background-image: url('https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg');"></div>
                <div class="card-gradient"></div>
                <div class="card-content">
                    <span class="card-icon">🌌</span>
                    <h2 class="card-title">Discovery</h2>
                    <p class="card-desc">Explore Movies</p>
                </div>
            </a>

            <!-- SNACKS -->
            <a href="snacks.html" class="card">
                <div class="card-img" style="background-image: url('https://image.tmdb.org/t/p/w500/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg');"></div>
                <div class="card-gradient"></div>
                <div class="card-content">
                    <span class="card-icon">🍿</span>
                    <h2 class="card-title">Snacks</h2>
                    <p class="card-desc">Galactic Menu Order</p>
                </div>
            </a>

            <!-- REVIEWS -->
            <a href="reviews.html" class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=500&auto=format&fit=crop');"></div>
                <div class="card-gradient"></div>
                <div class="card-content">
                    <span class="card-icon">⭐</span>
                    <h2 class="card-title">Reviews</h2>
                    <p class="card-desc">Rate & Review</p>
                </div>
            </a>
        </div>
    </div>

    <script>
        // Smooth Cursor Glow
        const cursorGlow = document.getElementById('cursorGlow');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let glowX = mouseX;
        let glowY = mouseY;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateGlow() {
            glowX += (mouseX - glowX) * 0.1;
            glowY += (mouseY - glowY) * 0.1;
            cursorGlow.style.left = glowX + 'px';
            cursorGlow.style.top = glowY + 'px';
            requestAnimationFrame(animateGlow);
        }
        animateGlow();

        // 3D Card Hover Effect
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -10;
                const rotateY = ((x - centerX) / centerX) * 10;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });

        // Interactive Stardust Canvas Replacement
        const starContainer = document.getElementById("stars");
        for (let i = 0; i < 200; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = (Math.random() * 5) + 's';
            starContainer.appendChild(star);
        }
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navLinks = document.querySelector('.nav-links');
            if (navLinks) {
                const user = JSON.parse(localStorage.getItem('user'));
                if (user) {
                    navLinks.innerHTML = `
                        <a href="profile.html" style="color:var(--primary)">Hi, ${user.username}</a>
                        <a href="#" onclick="logout()" class="btn-register">Logout</a>
                    `;
                } else {
                    navLinks.innerHTML = `
                        <a href="login.html">Login</a>
                        <a href="register.html" class="btn-register">Register</a>
                    `;
                }
            }
        });
        function logout() {
            localStorage.removeItem('user');
            window.location.reload();
        }
    </script>
</body>
</html>
