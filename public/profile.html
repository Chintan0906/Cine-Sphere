<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CineSphere</title>
    <link rel="stylesheet" href="styles/global.css?v=1.0.1">
    <script src="scripts/auth.js"></script>
    <style>
        .container { max-width: 1000px; margin: 0 auto; padding: 50px 20px; flex: 1; position: relative; z-index: 10; width: 100%; }

        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-family: 'Outfit', sans-serif; font-size: 3.5rem; color: #fff; margin-bottom: 10px; }
        header p { color: var(--primary); font-size: 1.2rem; }

        .history-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        .history-card { background: rgba(10, 10, 10, 0.7); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px 30px; backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .history-card:hover { border-color: rgba(255, 215, 0, 0.3); transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        
        .history-icon { font-size: 2.5rem; margin-right: 25px; }
        
        .history-details { flex: 1; }
        .history-title { font-family: 'Outfit', sans-serif; font-size: 1.4rem; color: #fff; margin-bottom: 5px; text-transform: capitalize; }
        .history-meta { color: var(--text-muted); font-size: 0.95rem; }
        .history-meta span { color: var(--primary); font-weight: 600; margin-right: 15px; }
        
        .history-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .history-date { color: #888; font-size: 0.9rem; }
        .view-btn { background: rgba(255, 215, 0, 0.1); color: var(--primary); border: 1px solid var(--primary); padding: 6px 16px; border-radius: 20px; font-family: 'Outfit', sans-serif; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .view-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary-glow); }

        .empty-state { text-align: center; color: var(--text-muted); padding: 50px; font-size: 1.2rem; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px dashed var(--glass-border); }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(5px); }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-box { background: rgba(15, 15, 15, 0.95); border: 1px solid var(--glass-border); border-top: 3px solid var(--primary); padding: 40px; border-radius: 20px; max-width: 500px; width: 90%; transform: translateY(20px); transition: 0.3s; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal.show .modal-box { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-title { font-family: 'Outfit', sans-serif; font-size: 1.8rem; color: #fff; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .close-btn:hover { color: #ff4c4c; }
        .modal-body { color: #ccc; line-height: 1.6; font-size: 1.05rem; }
        .modal-body ul { list-style: none; padding-left: 0; margin-top: 15px; }
        .modal-body li { padding: 10px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .modal-body li:last-child { border-bottom: none; }
        .modal-total { font-size: 1.3rem; color: var(--primary); font-family: 'Outfit', sans-serif; font-weight: 700; margin-top: 20px; text-align: right; }

        @media (max-width: 600px) {
            .container { padding: 30px 15px; }
            header { margin-bottom: 30px; }
            header h1 { font-size: 2.2rem; }
            header p { font-size: 1rem; }
            .history-card {
                flex-direction: column;
                align-items: stretch;
                padding: 20px;
                gap: 15px;
            }
            .history-card > div {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 10px;
            }
            .history-icon {
                margin-right: 0;
                margin-bottom: 5px;
            }
            .history-right {
                text-align: left;
                align-items: flex-start;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
                padding-top: 15px;
                width: 100%;
            }
            .history-meta {
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .history-meta span {
                margin-right: 0;
            }
        }

        @media (max-width: 480px) {
            .modal-box {
                padding: 25px 20px;
            }
            .modal-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div id="stars"></div>

    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" stroke="url(#logoGrad)" stroke-width="2"/>
                    <circle cx="12" cy="12" r="4" fill="url(#logoGrad)"/>
                    <path d="M12 2v6M12 16v6M2 12h6M16 12h6" stroke="url(#logoGrad)" stroke-width="1.5"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#fff176" />
                            <stop offset="50%" stop-color="#ffd700" />
                            <stop offset="100%" stop-color="#ffb300" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            CINE<span>SPHERE</span>
        </a>
        <div class="nav-links">
            <!-- Dynamic links injected by auth.js -->
        </div>
    </nav>

    <div class="container">
        <header>
            <h1 id="userName">Your Profile</h1>
            <p>Your Cinematic History</p>
        </header>

        <div class="history-grid" id="historyContainer">
            <div class="empty-state">Loading your universe...</div>
        </div>
    </div>

    <!-- DETAILS MODAL -->
    <div class="modal" id="detailsModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Order Details</div>
                <button class="close-btn" onclick="closeModal()">✖</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Details injected here -->
            </div>
        </div>
    </div>

    <script>
        let globalHistory = [];

        async function loadHistory() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').innerText = `Welcome, ${user.username}`;
            const container = document.getElementById('historyContainer');

            try {
                const res = await fetch(`/api/history/${user.userId}`);
                const data = await res.json();
                
                if (data.success && data.history.length > 0) {
                    globalHistory = data.history;
                    container.innerHTML = '';
                    data.history.forEach((item, index) => {
                        const date = new Date(item.created_at).toLocaleString();
                        let icon = item.action_type === 'booking' ? '🎟️' : '🍿';
                        let title = item.action_type === 'booking' ? 'Movie Ticket Booked' : 'Snacks Ordered';
                        let detailsStr = '';

                        if (item.action_type === 'booking') {
                            detailsStr = `<span>Tickets: ${item.details.tickets}</span> Total: $${parseFloat(item.details.total).toFixed(2)}`;
                        } else {
                            const itemsList = item.details.items ? item.details.items.length + ' Items' : 'Various Items';
                            detailsStr = `<span>${itemsList}</span> Total: $${parseFloat(item.details.total).toFixed(2)}`;
                        }

                        container.innerHTML += `
                            <div class="history-card">
                                <div style="display:flex; align-items:center;">
                                    <div class="history-icon">${icon}</div>
                                    <div class="history-details">
                                        <div class="history-title">${title}</div>
                                        <div class="history-meta">${detailsStr}</div>
                                    </div>
                                </div>
                                <div class="history-right">
                                    <div class="history-date">${date}</div>
                                    <button class="view-btn" onclick="openModal(${index})">View Details</button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `<div class="empty-state">You haven't made any bookings or orders yet.</div>`;
                }
            } catch (e) {
                container.innerHTML = `<div class="empty-state">Error connecting to the celestial servers...</div>`;
            }
        }

        function openModal(index) {
            const item = globalHistory[index];
            const modalBody = document.getElementById('modalBody');
            const modalTitle = document.getElementById('modalTitle');
            const date = new Date(item.created_at).toLocaleString();

            if (item.action_type === 'booking') {
                modalTitle.innerText = "🎟️ Booking Details";
                const theaterHtml = item.details.theater ? `<p><strong>Theater:</strong> ${item.details.theater}</p>` : '';
                const timeHtml = item.details.showtime ? `<p><strong>Showtime:</strong> ${item.details.showtime}</p>` : '';
                modalBody.innerHTML = `
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:15px;">Order placed on ${date}</p>
                    ${theaterHtml}
                    ${timeHtml}
                    <p><strong>Tickets Booked:</strong> ${item.details.tickets}</p>
                    <div class="modal-total" style="margin-top:10px;">Total Paid: $${parseFloat(item.details.total).toFixed(2)}</div>
                `;
            } else {
                modalTitle.innerText = "🍿 Snack Order";
                let listHtml = item.details.items ? item.details.items.map(i => `<li><span>${i}</span></li>`).join('') : '';
                modalBody.innerHTML = `
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:15px;">Order placed on ${date}</p>
                    <p><strong>Items Ordered:</strong></p>
                    <ul>${listHtml}</ul>
                    <div class="modal-total">Total Paid: $${parseFloat(item.details.total).toFixed(2)}</div>
                `;
            }

            document.getElementById('detailsModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.remove('show');
        }

        loadHistory();
    </script>
</body>
</html>
