<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery - CineSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Dynamic Background */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(30, 20, 0, 0.8) 0%, var(--bg-dark) 60%);
            z-index: -2;
        }

        #stars { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px rgba(255, 255, 255, 0.6);
            animation: twinkle var(--duration, 4s) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.6) translateY(0); }
            100% { opacity: 1; transform: scale(1.3) translateY(-5px); }
        }

        /* Navigation */
        nav {
            padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800;
            letter-spacing: 2px; color: var(--text-main); text-decoration: none;
        }
        .logo span { color: var(--primary); }
        
        .nav-links a {
            color: var(--text-muted); text-decoration: none; margin-left: 20px;
            font-weight: 500; font-family: 'Outfit', sans-serif; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }

        /* Header */
        header { text-align: center; padding: 50px 20px 20px; position: relative; z-index: 10; }
        header h1 {
            font-family: 'Outfit', sans-serif; font-size: 3.5rem; font-weight: 800;
            background: linear-gradient(to right, #fff, #ffe066);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        /* Search Container */
        .search-container {
            display: flex; justify-content: center; gap: 15px;
            margin: 40px auto 60px; max-width: 700px; padding: 0 20px;
        }

        .search-input {
            flex: 1; padding: 18px 30px; border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff; font-size: 1.1rem; outline: none; transition: 0.3s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        .search-input::placeholder { color: rgba(255,255,255,0.4); }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-btn {
            padding: 0 40px; border-radius: 50px; border: none;
            background: var(--primary); color: #000; font-weight: 700;
            font-family: 'Outfit', sans-serif; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .search-btn:hover {
            transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        /* Movie Grid */
        .discovery-section { max-width: 1400px; margin: 0 auto; padding: 0 50px 80px; }
        .movie-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 35px;
            transition: opacity 0.3s;
        }

        .movie-card {
            background: var(--glass-bg); border-radius: 16px; overflow: hidden;
            text-decoration: none; border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; flex-direction: column; transition: 0.4s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .movie-card:hover {
            transform: translateY(-10px); border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 20px 50px rgba(255, 215, 0, 0.15);
        }

        .poster-container { position: relative; width: 100%; padding-top: 150%; overflow: hidden; }
        .poster {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
            transition: 0.5s;
        }
        .movie-card:hover .poster { transform: scale(1.05); }

        .card-content {
            padding: 20px; text-align: left; display: flex; flex-direction: column; flex-grow: 1;
        }

        .movie-title {
            color: #fff; font-size: 1.15rem; font-weight: 600; font-family: 'Outfit', sans-serif;
            margin-bottom: 8px; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .movie-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto; padding-top: 10px;
        }

        .movie-year { color: var(--text-muted); font-size: 0.95rem; }

        .imdb-badge {
            background: var(--primary); color: #000; padding: 4px 10px;
            border-radius: 4px; font-size: 0.8rem; font-weight: 800; font-family: 'Outfit', sans-serif;
        }

        /* Loading / Error Messages */
        .message-container { grid-column: 1 / -1; text-align: center; padding: 40px; }
        .message-container h2 { font-family: 'Outfit'; color: var(--text-muted); font-weight: 400; }
        
        @media (max-width: 768px) {
            nav { padding: 20px; }
            .discovery-section { padding: 0 20px 60px; }
            header h1 { font-size: 2.5rem; }
            .search-container { flex-direction: column; }
            .search-btn { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div id="stars"></div>

    <nav>
        <a href="about_us.html" class="logo">CINE<span>SPHERE</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <header>
        <h1>DISCOVER MOVIES</h1>
        <p>Search classics and find your next watch in the cinematic universe.</p>
    </header>

    <div class="discovery-section">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search for any movie..." onkeyup="handleEnter(event)">
            <button class="search-btn" onclick="searchMovies()">Search</button>
        </div>
        <div class="movie-grid" id="grid">
            <!-- Content via API -->
        </div>
    </div>

    <script>
        /* CSS Stars */
        const starContainer = document.getElementById("stars");
        for (let i = 0; i < 150; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px"; star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "vw"; star.style.top = Math.random() * 100 + "vh";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = (Math.random() * 5) + 's';
            starContainer.appendChild(star);
        }

        /* OMDb API */
        const API_KEY = "b0c112fa"; 
        const API_URL = "https://www.omdbapi.com/";

        const grid = document.getElementById("grid");
        const searchInput = document.getElementById("searchInput");

        searchMovies("Avengers");

        function handleEnter(e) {
            if (e.key === "Enter") searchMovies();
        }

        async function searchMovies(query = null) {
            const searchTerm = query || searchInput.value;
            if (!searchTerm) return;

            grid.innerHTML = "";
            grid.style.opacity = 0.5;

            try {
                // Use https explicitly
                const response = await fetch(`${API_URL}?apikey=${API_KEY}&s=${encodeURIComponent(searchTerm)}`);
                const data = await response.json();

                if (data.Response === "True") {
                    data.Search.forEach(movie => {
                        const poster = (movie.Poster && movie.Poster !== "N/A")
                            ? movie.Poster
                            : "https://via.placeholder.com/300x450/111/fff?text=NO+IMAGE";

                        grid.innerHTML += `
                            <a href="https://www.imdb.com/title/${movie.imdbID}/" target="_blank" class="movie-card">
                                <div class="poster-container"><img src="${poster}" class="poster" alt="${movie.Title}"></div>
                                <div class="card-content">
                                    <div class="movie-title">${movie.Title}</div>
                                    <div class="movie-meta">
                                        <div class="movie-year">${movie.Year}</div>
                                        <div class="imdb-badge">IMDb</div>
                                    </div>
                                </div>
                            </a>
                        `;
                    });
                } else {
                    grid.innerHTML = `<div class="message-container"><h2>${data.Error || "No results found."}</h2></div>`;
                }
            } catch (error) {
                console.error("API Error:", error);
                grid.innerHTML = "<div class='message-container'><h2 style='color:#ff5555;'>Fetch failed. Check connection.</h2></div>";
            } finally {
                grid.style.opacity = 1;
            }
        }
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navLinks = document.querySelector('.nav-links');
            if (navLinks) {
                const user = JSON.parse(localStorage.getItem('user'));
                if (user) {
                    navLinks.innerHTML = `
                        <a href="index.html">Home</a>
                        <a href="profile.html" style="color:var(--primary)">Hi, ${user.username}</a>
                        <a href="#" onclick="logout()">Logout</a>
                    `;
                } else {
                    navLinks.innerHTML = `
                        <a href="index.html">Home</a>
                        <a href="login.html">Login</a>
                        <a href="register.html">Register</a>
                    `;
                }
            }
        });
        function logout() {
            localStorage.removeItem('user');
            window.location.reload();
        }
    </script>
</body>
</html>
