<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        .discovery-section { padding: 0 50px 80px; position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        header { text-align: center; padding: 50px 20px 20px; position: relative; z-index: 10; }
        header h1 {
            font-family: 'Outfit', sans-serif; font-size: 3.5rem; font-weight: 800;
            background: linear-gradient(to right, #fff, #ffe066);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        /* Search Container */
        .search-container {
            display: flex; justify-content: center; gap: 15px;
            margin: 40px auto 40px; max-width: 700px; padding: 0 20px;
            position: relative; z-index: 10;
        }

        .search-input {
            flex: 1; padding: 18px 30px; border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff; font-size: 1.1rem; outline: none; transition: 0.3s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        .search-input::placeholder { color: rgba(255,255,255,0.4); }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-btn {
            padding: 0 40px; border-radius: 50px; border: none;
            background: var(--primary); color: #000; font-weight: 700;
            font-family: 'Outfit', sans-serif; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .search-btn:hover {
            transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }





        /* Loading / Error Messages */
        .message-container { grid-column: 1 / -1; text-align: center; padding: 40px; }
        .message-container h2 { font-family: 'Outfit'; color: var(--text-muted); font-weight: 400; }
        
        @media (max-width: 768px) {
            nav { padding: 20px; }
            .discovery-section { padding: 0 20px 60px; }
            header h1 { font-size: 2.5rem; }
            .search-container { flex-direction: column; }
            .search-btn { padding: 15px; }

            /* Mobile Chat Adaptations */
            .chat-window {
                width: calc(100% - 40px) !important;
                height: 65vh !important;
                bottom: 100px !important;
                right: 20px !important;
                left: 20px !important;
            }
            .resize-handle {
                display: none !important;
            }
        }

        @media (max-width: 500px) {
            /* Full Screen Mobile Chat App View */
            .chat-window {
                width: 100% !important;
                height: 100% !important;
                bottom: 0 !important;
                right: 0 !important;
                left: 0 !important;
                border-radius: 0 !important;
                border: none !important;
                z-index: 10000 !important;
            }
            .chat-btn {
                bottom: 20px !important;
                right: 20px !important;
            }
        }

        /* Chatbot UI */
        .chat-btn {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: #000;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            transition: 0.3s; z-index: 1000;
        }
        .chat-btn:hover { transform: scale(1.1); }

        .chat-window {
            position: fixed; bottom: 100px; right: 30px;
            width: 350px; height: 500px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);

            pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Resize Handles */
        .resize-handle {
            position: absolute;
            background: transparent;
            z-index: 1001;
        }
        .resizer-t {
            top: 0; left: 0; right: 0;
            height: 8px;
            cursor: ns-resize;
        }
        .resizer-l {
            top: 0; bottom: 0; left: 0;
            width: 8px;
            cursor: ew-resize;
        }
        .resizer-tl {
            top: 0; left: 0;
            width: 12px; height: 12px;
            cursor: nwse-resize;
        }
        .chat-window.active { opacity: 1; transform: translateY(0); pointer-events: all; }

        .chat-input {

        }

        .typing-indicator { display: none; align-self: flex-start; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 15px; border-bottom-left-radius: 4px; }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }

    <div class="scroll-container">
        <header>
            <h1>DISCOVER MOVIES</h1>
            <p>Search classics and find your next watch in the cinematic universe.</p>
        </header>

        <div class="discovery-section">
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Search for any movie..." onkeyup="handleEnter(event)">
                <button class="search-btn" onclick="searchMovies()">Search</button>
            </div>
            <div class="movie-grid" id="grid">
                <!-- Content via API -->
            </div>
        </div>
    </div>

    <script>
        /* CSS Stars */
        const starContainer = document.getElementById("stars");
        for (let i = 0; i < 150; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px"; star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "vw"; star.style.top = Math.random() * 100 + "vh";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = (Math.random() * 5) + 's';
            starContainer.appendChild(star);
        }

        /* OMDb API */
        const API_KEY = "b0c112fa"; 
        const API_URL = "https://www.omdbapi.com/";

        const grid = document.getElementById("grid");
        const searchInput = document.getElementById("searchInput");

        searchMovies("Avengers");

        function handleEnter(e) {
            if (e.key === "Enter") searchMovies();
        }

        async function searchMovies(query = null) {
            const searchTerm = query || searchInput.value;
            if (!searchTerm) return;

            grid.innerHTML = "";
            grid.style.opacity = 0.5;

            try {
                // Use https explicitly
                const response = await fetch(`${API_URL}?apikey=${API_KEY}&s=${encodeURIComponent(searchTerm)}`);
                const data = await response.json();

                if (data.Response === "True") {
                    data.Search.forEach(movie => {
                        const poster = (movie.Poster && movie.Poster !== "N/A")
                            ? movie.Poster
                            : "https://via.placeholder.com/300x450/111/fff?text=NO+IMAGE";

                        grid.innerHTML += `
                            <a href="https://www.imdb.com/title/${movie.imdbID}/" target="_blank" class="movie-card">
                                <div class="poster-container"><img src="${poster}" class="poster" alt="${movie.Title}"></div>
                                <div class="card-content">
                                    <div class="movie-title">${movie.Title}</div>
                                    <div class="movie-meta">
                                        <div class="movie-year">${movie.Year}</div>
                                        <div class="imdb-badge">IMDb</div>
                                    </div>
                                    <div class="card-explore">Explore Movie <span>→</span></div>
                                </div>
                            </a>
                        `;
                    });
                } else {
                    grid.innerHTML = `<div class="message-container"><h2>${data.Error || "No results found."}</h2></div>`;
                }
            } catch (error) {
                console.error("API Error:", error);
                grid.innerHTML = "<div class='message-container'><h2 style='color:#ff5555;'>Fetch failed. Check connection.</h2></div>";
            } finally {
                grid.style.opacity = 1;
            }
        }
    </script>

    <!-- Chatbot UI -->
    <div class="chat-btn" onclick="toggleChat()">💬</div>

    <div class="chat-window" id="chatWindow">
        <div class="resize-handle resizer-t"></div>
        <div class="resize-handle resizer-l"></div>
        <div class="resize-handle resizer-tl"></div>
        <div class="chat-header">
            <h3>Movie Assistant</h3>
            <button class="close-chat" onclick="toggleChat()">✖</button>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-msg msg-ai">Hi! I'm your movie AI. Ask me for recommendations or info about any movie!</div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." onkeyup="handleChatEnter(event)">
            <button class="chat-send" onclick="sendChatMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const chatBody = document.getElementById('chatBody');
        const chatInput = document.getElementById('chatInput');
        const typingIndicator = document.getElementById('typingIndicator');

        // Chatbot Resizing Logic
        (function() {
            const resizers = chatWindow.querySelectorAll('.resize-handle');
            let original_width = 0;
            let original_height = 0;
            let original_mouse_x = 0;
            let original_mouse_y = 0;

            for (let i = 0; i < resizers.length; i++) {
                const currentResizer = resizers[i];
                currentResizer.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    original_width = parseFloat(getComputedStyle(chatWindow, null).getPropertyValue('width').replace('px', ''));
                    original_height = parseFloat(getComputedStyle(chatWindow, null).getPropertyValue('height').replace('px', ''));
                    original_mouse_x = e.clientX;
                    original_mouse_y = e.clientY;
                    window.addEventListener('mousemove', resize);
                    window.addEventListener('mouseup', stopResize);
                });

                function resize(e) {
                    if (currentResizer.classList.contains('resizer-l')) {
                        const width = original_width + (original_mouse_x - e.clientX);
                        if (width > 280 && width < window.innerWidth - 60) {
                            chatWindow.style.width = width + 'px';
                        }
                    } else if (currentResizer.classList.contains('resizer-t')) {
                        const height = original_height + (original_mouse_y - e.clientY);
                        if (height > 300 && height < window.innerHeight - 150) {
                            chatWindow.style.height = height + 'px';
                        }
                    } else if (currentResizer.classList.contains('resizer-tl')) {
                        const width = original_width + (original_mouse_x - e.clientX);
                        const height = original_height + (original_mouse_y - e.clientY);
                        if (width > 280 && width < window.innerWidth - 60) {
                            chatWindow.style.width = width + 'px';
                        }
                        if (height > 300 && height < window.innerHeight - 150) {
                            chatWindow.style.height = height + 'px';
                        }
                    }
                }

                function stopResize() {
                    window.removeEventListener('mousemove', resize);
                    window.removeEventListener('mouseup', stopResize);
                }
            }
        })();

        function toggleChat() {
            chatWindow.classList.toggle('active');
            if (chatWindow.classList.contains('active')) chatInput.focus();
        }

        function handleChatEnter(e) {
            if (e.key === "Enter") sendChatMessage();
        }

        async function sendChatMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            appendMessage(message, 'msg-user');
            chatInput.value = '';

            typingIndicator.style.display = 'block';
            chatBody.appendChild(typingIndicator); // Move to bottom
            chatBody.scrollTop = chatBody.scrollHeight;

            try {
                const response = await fetch('/api/movies', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message }) 
                });
                
                const data = await response.json();
                typingIndicator.style.display = 'none';

                let aiResponse = "Sorry, I couldn't understand the response.";
                
                function deepFindPayload(obj) {
                    if (!obj || typeof obj !== 'object') return null;
                    if ((obj.type === 'movies' && Array.isArray(obj.movies)) || obj.type === 'text' || obj.type === 'details') {
                        return obj;
                    }
                    for (let key in obj) {
                        let res = deepFindPayload(obj[key]);
                        if (res) return res;
                    }
                    return null;
                }

                let targetPayload = deepFindPayload(data);

                if (!targetPayload) {
                    function searchStringsForJson(obj) {
                        if (typeof obj === 'string') {
                            try {
                                let parsed = JSON.parse(obj);
                                let found = deepFindPayload(parsed);
                                if (found) return found;
                            } catch(e) {}
                        } else if (obj && typeof obj === 'object') {
                            for (let key in obj) {
                                let res = searchStringsForJson(obj[key]);
                                if (res) return res;
                            }
                        }
                        return null;
                    }
                    targetPayload = searchStringsForJson(data);
                }

                if (targetPayload) {
                    if (targetPayload.type === 'movies' && Array.isArray(targetPayload.movies)) {
                        appendMessage("Here are some recommendations:", 'msg-ai');
                        await renderChatMovies(targetPayload.movies);
                    } else if (targetPayload.type === 'details') {
                        appendMessage("Here are the details:", 'msg-ai');
                        await renderChatDetails(targetPayload);
                    } else if (targetPayload.type === 'text') {
                        appendMessage(targetPayload.message || "No message found.", 'msg-ai');
                    }
                } else {
                    let fallbackStr = JSON.stringify(data, null, 2);
                    if (data && typeof data === 'object') {
                        if (Array.isArray(data) && data[0] && data[0].output) fallbackStr = data[0].output;
                        else if (data.output) fallbackStr = data.output;
                    }
                    appendMessage(fallbackStr, 'msg-ai');
                }
            } catch (error) {
                console.error("Chat error:", error);
                typingIndicator.style.display = 'none';
                appendMessage("Failed to reach the AI. Please make sure the server and n8n webhook are running.", 'msg-ai');
            }
        }

        async function renderChatMovies(movies) {
            const scrollContainer = document.createElement('div');
            scrollContainer.style.display = 'flex';
            scrollContainer.style.flexDirection = 'column'; // Stack vertically
            scrollContainer.style.gap = '10px';
            scrollContainer.style.marginTop = '15px';
            scrollContainer.style.paddingBottom = '15px';

            chatBody.appendChild(scrollContainer);
            chatBody.appendChild(typingIndicator); // Keep indicator at very bottom

            for (let m of movies) {
                let poster = "https://via.placeholder.com/300x450/111/fff?text=NO+IMAGE";
                let imdbID = "";
                let year = "";
                try {
                    const res = await fetch(`${API_URL}?apikey=${API_KEY}&t=${encodeURIComponent(m.name)}`);
                    const details = await res.json();
                    if (details.Response === "True") {
                        if (details.Poster && details.Poster !== "N/A") poster = details.Poster;
                        imdbID = details.imdbID;
                        year = details.Year;
                    }
                } catch(e) {}
                
                const card = document.createElement('a');
                card.className = "chat-movie-card";
                if(imdbID) {
                    card.href = `https://www.imdb.com/title/${imdbID}/`;
                    card.target = "_blank";
                }
                
                card.innerHTML = `
                    <div class="chat-poster-container">
                        <img src="${poster}" alt="${m.name}">
                    </div>
                    <div class="chat-card-content">
                        <div class="movie-title">${m.name}</div>
                        <div class="movie-genre">${m.genre}</div>
                        <div class="movie-reason">${m.reason}</div>
                        <div class="movie-meta-row">
                            <div class="movie-year-badge">${year}</div>
                            <div class="imdb-badge-small">IMDb</div>
                        </div>
                    </div>
                `;
                scrollContainer.appendChild(card);
                chatBody.scrollTop = chatBody.scrollHeight; // Scroll down smoothly as posters load
            }
        }

        async function renderChatDetails(m) {
            const container = document.createElement('div');
            container.style.marginTop = '15px';
            container.style.paddingBottom = '15px';

            chatBody.appendChild(container);
            chatBody.appendChild(typingIndicator); 

            let poster = "https://via.placeholder.com/300x450/111/fff?text=NO+IMAGE";
            let imdbID = "";
            let fetchedYear = m.year || "";
            try {
                const res = await fetch(`${API_URL}?apikey=${API_KEY}&t=${encodeURIComponent(m.title)}`);
                const omdb = await res.json();
                if (omdb.Response === "True") {
                    if (omdb.Poster && omdb.Poster !== "N/A") poster = omdb.Poster;
                    imdbID = omdb.imdbID;
                    if (!fetchedYear) fetchedYear = omdb.Year;
                }
            } catch(e) {}
            
            const card = document.createElement('div');
            card.className = "chat-detail-card";
            
            let castHtml = Array.isArray(m.cast) ? m.cast.join(', ') : m.cast;
            
            card.innerHTML = `
                <div class="chat-detail-poster">
                    <img src="${poster}" alt="${m.title}">
                </div>
                <div class="chat-detail-content">
                    <div class="movie-title">${m.title} <span style="font-size:0.9rem; color:var(--text-muted)">(${fetchedYear})</span></div>
                    <div class="movie-genre">${m.genre}</div>
                    <div class="movie-summary">${m.summary}</div>
                    <div class="movie-info-line"><strong>Director:</strong> <span>${m.director}</span></div>
                    <div class="movie-info-line"><strong>Cast:</strong> <span>${castHtml}</span></div>
                    ${imdbID ? '<a href="https://www.imdb.com/title/' + imdbID + '/" target="_blank" class="imdb-link-btn">View on IMDb</a>' : ''}
                </div>
            `;
            container.appendChild(card);
            chatBody.scrollTop = chatBody.scrollHeight; 
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg ' + className;
            msgDiv.innerText = text;
            chatBody.appendChild(msgDiv);
            chatBody.appendChild(typingIndicator); // Move to bottom
            chatBody.scrollTop = chatBody.scrollHeight;
        }
    </script>
</body>
</html>
