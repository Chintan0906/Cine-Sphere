<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Showing - CineSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Dynamic Background */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(30, 20, 0, 0.8) 0%, var(--bg-dark) 60%);
            z-index: -2;
        }

        #stars { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px rgba(255, 255, 255, 0.6);
            animation: twinkle var(--duration, 4s) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.6) translateY(0); }
            100% { opacity: 1; transform: scale(1.3) translateY(-5px); }
        }

        /* Navigation */
        nav {
            padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800;
            letter-spacing: 2px; color: var(--text-main); text-decoration: none;
        }
        .logo span { color: var(--primary); }
        
        .nav-links a {
            color: var(--text-muted); text-decoration: none; margin-left: 20px;
            font-weight: 500; font-family: 'Outfit', sans-serif; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }

        /* Header */
        header { text-align: center; padding: 50px 20px 20px; position: relative; z-index: 10; }
        header h1 {
            font-family: 'Outfit', sans-serif; font-size: 3.5rem; font-weight: 800;
            background: linear-gradient(to right, #fff, #ffe066);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        /* Search Container */
        .search-container {
            display: flex; justify-content: center; gap: 15px;
            margin: 40px auto 30px; max-width: 700px; padding: 0 20px;
            position: relative; z-index: 10;
        }

        .search-input {
            flex: 1; padding: 18px 30px; border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff; font-size: 1.1rem; outline: none; transition: 0.3s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        .search-input::placeholder { color: rgba(255,255,255,0.4); }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-btn {
            padding: 0 40px; border-radius: 50px; border: none;
            background: var(--primary); color: #000; font-weight: 700;
            font-family: 'Outfit', sans-serif; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .search-btn:hover {
            transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        /* Movie Grid */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 50px 80px; position: relative; z-index: 10; }
        .movies-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 40px;
            transition: opacity 0.3s;
        }

        .movie-card {
            background: var(--glass-bg); border-radius: 16px; overflow: hidden;
            text-decoration: none; border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; flex-direction: column; transition: 0.4s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
        }
        .movie-card:hover {
            transform: translateY(-10px); border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 20px 50px rgba(255, 215, 0, 0.15);
        }

        .poster-container { position: relative; width: 100%; padding-top: 140%; overflow: hidden; }
        .poster {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
            transition: 0.5s;
        }
        .movie-card:hover .poster { transform: scale(1.05); }

        .card-content {
            padding: 20px; text-align: left; display: flex; flex-direction: column; flex-grow: 1;
            background: linear-gradient(to top, rgba(5,5,5,1) 0%, rgba(5,5,5,0.8) 100%);
        }

        .movie-title {
            color: #fff; font-size: 1.25rem; font-weight: 700; font-family: 'Outfit', sans-serif;
            margin-bottom: 8px; line-height: 1.2;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .tags {
            color: var(--primary); font-size: 0.9rem; margin-bottom: 20px; font-weight: 500;
        }

        .book-btn-small {
            background: var(--primary); color: #000; padding: 12px; border-radius: 8px;
            font-weight: 700; font-family: 'Outfit', sans-serif; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s; text-align: center; margin-top: auto;
        }
        .book-btn-small:hover {
            background: #fff; box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        /* LOADING */
        .loading {
            grid-column: 1 / -1; text-align: center; font-family: 'Outfit', sans-serif;
            font-size: 1.5rem; color: var(--text-muted); padding: 50px;
        }

        @media (max-width: 768px) {
            nav { padding: 20px; }
            .container { padding: 0 20px 60px; }
            header h1 { font-size: 2.5rem; }
            .search-container { flex-direction: column; }
            .search-btn { padding: 15px; }
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div id="stars"></div>

    <nav>
        <a href="about_us.html" class="logo">CINE<span>SPHERE</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <header>
        <h1>NOW SHOWING</h1>
        <p>Book tickets for the latest blockbusters in premium theaters</p>
    </header>

    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="Search for a movie to book..." onkeyup="handleEnter(event)">
        <button class="search-btn" onclick="triggerSearch()">Search</button>
    </div>

    <div class="container">
        <div class="movies-grid" id="grid">
            <div class="loading">Loading Movies...</div>
        </div>
    </div>

    <script>
        // Star Background
        const starContainer = document.getElementById("stars");
        for (let i = 0; i < 150; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px"; star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "vw"; star.style.top = Math.random() * 100 + "vh";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = (Math.random() * 5) + 's';
            starContainer.appendChild(star);
        }

        // OMDb API Config
        const API_KEY = "b0c112fa";
        const API_URL = "https://www.omdbapi.com/";

        // List of "Now Playing" movies (Default view)
        const currentMovies = [
            "Dune: Part Two", "Oppenheimer", "Godzilla x Kong: The New Empire",
            "Civil War", "Kung Fu Panda 4", "The Fall Guy", 
            "Kingdom of the Planet of the Apes", "Furiosa: A Mad Max Saga"
        ];

        const grid = document.getElementById("grid");
        const searchInput = document.getElementById("searchInput");

        async function loadDefaults() {
            grid.innerHTML = "";
            for (const title of currentMovies) {
                try {
                    const res = await fetch(`${API_URL}?apikey=${API_KEY}&t=${encodeURIComponent(title)}`);
                    const movie = await res.json();
                    if (movie.Response === "True") displayCard(movie);
                } catch (err) {
                    console.error("Error fetching " + title, err);
                }
            }
        }

        async function triggerSearch() {
            const query = searchInput.value.trim();
            if (!query) { loadDefaults(); return; }

            grid.innerHTML = "<div class='loading'>Searching...</div>";

            try {
                const res = await fetch(`${API_URL}?apikey=${API_KEY}&s=${encodeURIComponent(query)}`);
                const data = await res.json();
                grid.innerHTML = ""; 

                if (data.Response === "True") {
                    data.Search.forEach(movie => displayCard(movie, true));
                } else {
                    grid.innerHTML = `<div class='loading'>${data.Error}</div>`;
                }
            } catch (err) {
                console.error("Search Error", err);
                grid.innerHTML = "<div class='loading'>Something went wrong.</div>";
            }
        }

        function displayCard(movie, isSearch = false) {
            const poster = (movie.Poster && movie.Poster !== "N/A") ? movie.Poster : "https://via.placeholder.com/300x450/111/fff?text=No+Poster";
            const tags = isSearch ? movie.Year : (movie.Genre + " | " + movie.Runtime);

            grid.innerHTML += `
                <a href="booking_portal.html?id=${movie.imdbID}" class="movie-card">
                    <div class="poster-container"><img src="${poster}" class="poster" alt="${movie.Title}"></div>
                    <div class="card-content">
                        <div>
                            <div class="movie-title">${movie.Title}</div>
                            <div class="tags">${tags}</div>
                        </div>
                        <div class="book-btn-small">Book Now</div>
                    </div>
                </a>
            `;
        }

        function handleEnter(e) { if (e.key === "Enter") triggerSearch(); }
        loadDefaults();
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navLinks = document.querySelector('.nav-links');
            if (navLinks) {
                const user = JSON.parse(localStorage.getItem('user'));
                if (user) {
                    navLinks.innerHTML = `
                        <a href="index.html">Home</a>
                        <a href="profile.html" style="color:var(--primary)">Hi, ${user.username}</a>
                        <a href="#" onclick="logout()">Logout</a>
                    `;
                } else {
                    navLinks.innerHTML = `
                        <a href="index.html">Home</a>
                        <a href="login.html">Login</a>
                        <a href="register.html">Register</a>
                    `;
                }
            }
        });
        function logout() {
            localStorage.removeItem('user');
            window.location.reload();
        }
    </script>
</body>
</html>
