<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Showing - CineSphere</title>
    <link rel="stylesheet" href="styles/global.css">
    <script src="scripts/auth.js"></script>
    <style>

        /* Header */
        header { text-align: center; padding: 50px 20px 20px; position: relative; z-index: 10; }
        header h1 {
            font-family: 'Outfit', sans-serif; font-size: 3.5rem; font-weight: 800;
            background: linear-gradient(to right, #fff, #ffe066);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        /* Search Container */
        .search-container {
            display: flex; justify-content: center; gap: 15px;
            margin: 40px auto 30px; max-width: 700px; padding: 0 20px;
            position: relative; z-index: 10;
        }

        .search-input {
            flex: 1; padding: 18px 30px; border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff; font-size: 1.1rem; outline: none; transition: 0.3s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        .search-input::placeholder { color: rgba(255,255,255,0.4); }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-btn {
            padding: 0 40px; border-radius: 50px; border: none;
            background: var(--primary); color: #000; font-weight: 700;
            font-family: 'Outfit', sans-serif; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .search-btn:hover {
            transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        /* LOADING */
        .loading {
            grid-column: 1 / -1; text-align: center; font-family: 'Outfit', sans-serif;
            font-size: 1.5rem; color: var(--text-muted); padding: 50px;
        }

        @media (max-width: 768px) {
            nav { padding: 20px; }
            .container { padding: 0 20px 60px; }
            header h1 { font-size: 2.5rem; }
            .search-container { flex-direction: column; }
            .search-btn { padding: 15px; }
        }
    </style>
<body class="fixed-viewport-body">

    <div class="ambient-bg"></div>
    <div id="stars"></div>

    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" stroke="url(#logoGrad)" stroke-width="2"/>
                    <circle cx="12" cy="12" r="4" fill="url(#logoGrad)"/>
                    <path d="M12 2v6M12 16v6M2 12h6M16 12h6" stroke="url(#logoGrad)" stroke-width="1.5"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#fff176" />
                            <stop offset="50%" stop-color="#ffd700" />
                            <stop offset="100%" stop-color="#ffb300" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            CINE<span>SPHERE</span>
        </a>
        <div class="nav-links">
            <!-- Dynamic links injected by auth.js -->
        </div>
    </nav>

    <div class="scroll-container">
        <header>
            <h1>NOW SHOWING</h1>
            <p>Book tickets for the latest blockbusters in premium theaters</p>
        </header>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search for a movie to book..." onkeyup="handleEnter(event)">
            <button class="search-btn" onclick="triggerSearch()">Search</button>
        </div>

        <div class="container">
            <div class="movies-grid" id="grid">
                <div class="loading">Loading Movies...</div>
            </div>
        </div>
    </div>

    <script>
        // Star Background
        const starContainer = document.getElementById("stars");
        for (let i = 0; i < 150; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px"; star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "vw"; star.style.top = Math.random() * 100 + "vh";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = (Math.random() * 5) + 's';
            starContainer.appendChild(star);
        }

        // OMDb API Config
        const API_KEY = "b0c112fa";
        const API_URL = "https://www.omdbapi.com/";

        // List of "Now Playing" movies (Default view)
        const currentMovies = [
            "Dune: Part Two", "Oppenheimer", "Godzilla x Kong: The New Empire",
            "Civil War", "Kung Fu Panda 4", "The Fall Guy", 
            "Kingdom of the Planet of the Apes", "Furiosa: A Mad Max Saga"
        ];

        const grid = document.getElementById("grid");
        const searchInput = document.getElementById("searchInput");

        async function loadDefaults() {
            grid.innerHTML = "";
            for (const title of currentMovies) {
                try {
                    const res = await fetch(`${API_URL}?apikey=${API_KEY}&t=${encodeURIComponent(title)}`);
                    const movie = await res.json();
                    if (movie.Response === "True") displayCard(movie);
                } catch (err) {
                    console.error("Error fetching " + title, err);
                }
            }
        }

        async function triggerSearch() {
            const query = searchInput.value.trim();
            if (!query) { loadDefaults(); return; }

            grid.innerHTML = "<div class='loading'>Searching...</div>";

            try {
                const res = await fetch(`${API_URL}?apikey=${API_KEY}&s=${encodeURIComponent(query)}`);
                const data = await res.json();
                grid.innerHTML = ""; 

                if (data.Response === "True") {
                    data.Search.forEach(movie => displayCard(movie, true));
                } else {
                    grid.innerHTML = `<div class='loading'>${data.Error}</div>`;
                }
            } catch (err) {
                console.error("Search Error", err);
                grid.innerHTML = "<div class='loading'>Something went wrong.</div>";
            }
        }

        function displayCard(movie, isSearch = false) {
            const poster = (movie.Poster && movie.Poster !== "N/A") ? movie.Poster : "https://via.placeholder.com/300x450/111/fff?text=No+Poster";
            const tags = isSearch ? movie.Year : (movie.Genre + " | " + movie.Runtime);

            grid.innerHTML += `
                <a href="booking_portal.html?id=${movie.imdbID}" class="movie-card">
                    <div class="poster-container"><img src="${poster}" class="poster" alt="${movie.Title}"></div>
                    <div class="card-content">
                        <div>
                            <div class="movie-title">${movie.Title}</div>
                            <div class="tags">${tags}</div>
                        </div>
                        <div class="book-btn-small">Book Now</div>
                    </div>
                </a>
            `;
        }

        function handleEnter(e) { if (e.key === "Enter") triggerSearch(); }
        
        const urlParams = new URLSearchParams(window.location.search);
        const searchQuery = urlParams.get('search');
        if (searchQuery) {
            searchInput.value = searchQuery;
            triggerSearch();
        } else {
            loadDefaults();
        }
    </script>
    <!-- Dynamic scripts handled by auth.js -->
</body>
</html>
