<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CineSphere</title>
    <link rel="stylesheet" href="styles/global.css?v=1.0.1">
    <script src="scripts/auth.js?v=1.0.1"></script>
    <style>
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 100px 20px 40px; }

        .auth-box {
            background: rgba(10, 10, 10, 0.7); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 50px 40px; width: 100%; max-width: 450px;
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .auth-box h2 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; margin-bottom: 10px; color: #fff; }
        .auth-box p { color: var(--text-muted); margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #ccc; font-size: 0.95rem; }
        .input-group input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; transition: 0.3s; outline: none; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); background: rgba(255,255,255,0.1); }

        .btn-auth { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; color: #000; font-weight: 800; font-family: 'Outfit', sans-serif; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { box-shadow: 0 10px 20px var(--primary-glow); transform: translateY(-2px); }

        .auth-links { margin-top: 25px; font-size: 0.95rem; color: var(--text-muted); }
        .auth-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .auth-links a:hover { text-decoration: underline; }

        #errorMsg { color: #ff4c4c; margin-bottom: 15px; display: none; background: rgba(255,76,76,0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,76,76,0.3); }

        @media (max-width: 480px) {
            .auth-container {
                padding: 80px 10px 20px;
            }
            .auth-box {
                padding: 35px 20px;
                border-radius: 16px;
            }
            .auth-box h2 {
                font-size: 1.8rem;
            }
            .auth-box p {
                margin-bottom: 20px;
                font-size: 0.9rem;
            }
            .input-group {
                margin-bottom: 15px;
            }
            .input-group input {
                padding: 12px;
            }
            .btn-auth {
                padding: 12px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div id="stars"></div>

    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" stroke="url(#logoGrad)" stroke-width="2"/>
                    <circle cx="12" cy="12" r="4" fill="url(#logoGrad)"/>
                    <path d="M12 2v6M12 16v6M2 12h6M16 12h6" stroke="url(#logoGrad)" stroke-width="1.5"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#fff176" />
                            <stop offset="50%" stop-color="#ffd700" />
                            <stop offset="100%" stop-color="#ffb300" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            CINE<span>SPHERE</span>
        </a>
        <div class="nav-links">
            <!-- Dynamic links injected by auth.js -->
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Create Account</h2>
            <p>Join the universe of cinema</p>
            
            <div id="errorMsg"></div>

            <form id="registerForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn-auth">Register</button>
            </form>

            <div class="auth-links">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        // Register Logic
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();
                if (data.success) {
                    // Auto login
                    localStorage.setItem('user', JSON.stringify({ userId: data.userId, username: data.username, email: data.email }));
                    window.location.href = 'index.html';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = data.error;
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Network Error. Is the backend running?";
            }
        });
    </script>
</body>
</html>
