<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CineSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 0%, rgba(30, 20, 0, 0.8) 0%, var(--bg-dark) 60%); z-index: -2; }
        #stars { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .star { position: absolute; background: #fff; border-radius: 50%; box-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px rgba(255, 255, 255, 0.6); animation: twinkle var(--duration, 4s) ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.6) translateY(0); } 100% { opacity: 1; transform: scale(1.3) translateY(-5px); } }

        nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; position: absolute; width: 100%; top: 0; z-index: 100; border-bottom: 1px solid var(--glass-border); background: transparent; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--primary); }
        .nav-links a { color: var(--text-muted); text-decoration: none; margin-left: 20px; font-weight: 500; font-family: 'Outfit', sans-serif; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 100px 20px 40px; }

        .auth-box {
            background: rgba(10, 10, 10, 0.7); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 50px 40px; width: 100%; max-width: 450px;
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .auth-box h2 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; margin-bottom: 10px; color: #fff; }
        .auth-box p { color: var(--text-muted); margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #ccc; font-size: 0.95rem; }
        .input-group input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; transition: 0.3s; outline: none; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); background: rgba(255,255,255,0.1); }

        .btn-auth { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; color: #000; font-weight: 800; font-family: 'Outfit', sans-serif; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { box-shadow: 0 10px 20px var(--primary-glow); transform: translateY(-2px); }

        .auth-links { margin-top: 25px; font-size: 0.95rem; color: var(--text-muted); }
        .auth-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .auth-links a:hover { text-decoration: underline; }

        #errorMsg { color: #ff4c4c; margin-bottom: 15px; display: none; background: rgba(255,76,76,0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,76,76,0.3); }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div id="stars"></div>

    <nav>
        <a href="about_us.html" class="logo">CINE<span>SPHERE</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Create Account</h2>
            <p>Join the universe of cinema</p>
            
            <div id="errorMsg"></div>

            <form id="registerForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn-auth">Register</button>
            </form>

            <div class="auth-links">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        // Stars
        const starContainer = document.getElementById("stars");
        for (let i = 0; i < 150; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px"; star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "vw"; star.style.top = Math.random() * 100 + "vh";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = (Math.random() * 5) + 's';
            starContainer.appendChild(star);
        }

        // Register Logic
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await res.json();
                if (data.success) {
                    // Auto login
                    localStorage.setItem('user', JSON.stringify({ userId: data.userId, username: data.username, email: data.email }));
                    window.location.href = 'index.html';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = data.error;
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Network Error. Is the backend running?";
            }
        });
    </script>
</body>
</html>
